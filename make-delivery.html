<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Create a delivery link — Soul &amp; Fuel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,500&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<meta name="theme-color" content="#f3ede3">
<link rel="icon" href="images/logo/mnemonic-black.png" type="image/png">
<style>
  .maker { max-width: 660px; padding-top: 48px; padding-bottom: 90px; }
  .maker > .eyebrow { display: block; margin-bottom: 10px; }
  .maker h1 {
    font-family: var(--font-soul);
    font-style: italic;
    font-weight: 600;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.05;
    margin-bottom: 14px;
  }
  .maker-intro { color: var(--slate); line-height: 1.6; margin-bottom: 34px; }
  .maker-form label,
  .maker-out > label {
    display: block;
    font-family: var(--font-fuel);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--slate);
  }
  .maker-form label { margin-bottom: 18px; }
  .maker-form input,
  .maker-link-row input {
    width: 100%;
    font-family: var(--font-body);
    font-size: 15px;
    padding: 12px 14px;
    margin-top: 8px;
    border: 1.5px solid rgba(21, 20, 15, 0.2);
    border-radius: 2px;
    background: var(--bone);
    color: var(--ink);
  }
  .maker-form input:focus,
  .maker-link-row input:focus { outline: none; border-color: var(--ink); }
  .opt { text-transform: none; letter-spacing: 0; font-weight: 500; opacity: 0.7; }
  .maker-fieldhint {
    display: block;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    font-family: var(--font-body);
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--slate);
    margin-top: 8px;
  }
  input[type="file"] { margin-top: 8px; font-family: var(--font-body); font-size: 14px; color: var(--ink); }
  .cover-preview { display: flex; gap: 14px; align-items: center; margin: 0 0 18px; }
  .cover-preview img { width: 96px; height: 64px; object-fit: cover; border-radius: 2px; box-shadow: 0 4px 14px rgba(21,20,15,0.15); }
  .cover-preview-meta { font-family: var(--font-body); font-size: 13px; color: var(--slate); text-transform: none; letter-spacing: 0; font-weight: 400; }
  #cover-size { display: block; margin-bottom: 6px; }
  #cover-remove { font-family: var(--font-fuel); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ember); border-bottom: 1px solid var(--ember); }
  .maker-out { margin-top: 12px; padding-top: 26px; border-top: 1px solid rgba(21, 20, 15, 0.12); }
  .maker-link-row { display: flex; gap: 10px; align-items: stretch; margin-top: 8px; }
  .maker-link-row input { margin-top: 0; }
  .maker-link-row .btn { flex-shrink: 0; padding: 12px 22px; font-size: 13px; }
  .maker-hint { font-size: 13px; color: var(--slate); margin-top: 12px; min-height: 18px; }
  .maker-preview {
    display: inline-block;
    margin-top: 4px;
    color: var(--ember);
    border-bottom: 1px solid var(--ember);
    font-family: var(--font-fuel);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .maker-preview.is-off { opacity: 0.4; pointer-events: none; }
  @media (max-width: 540px) { .maker-link-row { flex-direction: column; } }
</style>
</head>
<body>

<header class="deliver-nav">
  <a href="index.html" class="logo-mark" aria-label="Soul & Fuel Media home">
    <img src="images/logo/horizontal-black.png" alt="Soul & Fuel Media">
  </a>
</header>

<section class="maker wrap">
  <span class="eyebrow">Internal tool</span>
  <h1>Create a delivery link</h1>
  <p class="maker-intro">Fill these in, copy the link, and send it to your client. First set the Google Drive folder to <strong>Share &rarr; Anyone with the link &rarr; Viewer</strong>.</p>

  <form class="maker-form" id="maker" autocomplete="off">
    <label>Project name
      <input type="text" id="f-project" placeholder="e.g. Tata Promont">
    </label>
    <label>Client / studio
      <input type="text" id="f-client" placeholder="e.g. Eden Elements">
    </label>
    <label>Google Drive folder link
      <input type="url" id="f-drive" placeholder="https://drive.google.com/drive/folders/...">
    </label>
    <label>Cover photo <span class="opt">— optional</span>
      <input type="file" id="f-coverfile" accept="image/*">
      <span class="maker-fieldhint">Pick a photo from your computer — it's shrunk to a lightweight preview and <strong>embedded in the link</strong>, so it keeps showing to your client even after you delete the file or disconnect the drive. (Or paste a hosted image URL below instead.)</span>
    </label>
    <div class="cover-preview" id="cover-preview" hidden>
      <img id="cover-thumb" alt="Cover preview">
      <div class="cover-preview-meta">
        <span id="cover-size"></span>
        <button type="button" id="cover-remove">Remove photo</button>
      </div>
    </div>
    <label>or hosted image URL <span class="opt">— optional</span>
      <input type="url" id="f-cover" placeholder="https://www.soulandfuel.com/images/projects/.../cover.jpg">
      <span class="maker-fieldhint">A <strong>direct image link</strong> ending in .jpg/.png (right-click a photo on soulandfuel.com &rarr; Copy image address). Used only if you haven't picked a photo above. Google Drive links won't work.</span>
    </label>
  </form>

  <div class="maker-out">
    <label for="out-link">Shareable link</label>
    <div class="maker-link-row">
      <input type="text" id="out-link" readonly placeholder="Fill in project name + Drive link above">
      <button class="btn" id="copy-btn" type="button">Copy</button>
    </div>
    <p class="maker-hint" id="hint"></p>
    <a class="maker-preview is-off" id="preview-link" href="#" target="_blank" rel="noopener">Open preview &rarr;</a>
  </div>
</section>

<script>
(function () {
  function utf8ToB64(str) {
    return btoa(
      encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function (_, p) {
        return String.fromCharCode("0x" + p);
      })
    );
  }
  var f = {
    project: document.getElementById("f-project"),
    client: document.getElementById("f-client"),
    drive: document.getElementById("f-drive"),
    cover: document.getElementById("f-cover")
  };
  var out = document.getElementById("out-link");
  var preview = document.getElementById("preview-link");
  var copyBtn = document.getElementById("copy-btn");
  var hint = document.getElementById("hint");

  var coverFile = document.getElementById("f-coverfile");
  var coverPreview = document.getElementById("cover-preview");
  var coverThumb = document.getElementById("cover-thumb");
  var coverSize = document.getElementById("cover-size");
  var coverRemove = document.getElementById("cover-remove");
  var embeddedCover = "";           // compressed data URI, embedded in the link
  var TARGET_BYTES = 26000;         // keeps the whole link comfortably shareable

  // Shrink + compress a picked photo until it fits the byte budget.
  function compress(img) {
    var widths = [900, 800, 700, 600, 520];
    var last = "";
    for (var i = 0; i < widths.length; i++) {
      var w = Math.min(widths[i], img.naturalWidth);
      var c = document.createElement("canvas");
      c.width = w;
      c.height = Math.round(img.naturalHeight * (w / img.naturalWidth));
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      for (var q = 0.72; q >= 0.34; q -= 0.06) {
        last = c.toDataURL("image/jpeg", q);
        var bytes = Math.ceil((last.length - last.indexOf(",") - 1) * 3 / 4);
        if (bytes <= TARGET_BYTES) return last;
      }
    }
    return last; // smallest we could make it
  }

  coverFile.addEventListener("change", function () {
    var file = coverFile.files && coverFile.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        embeddedCover = compress(img);
        var kb = Math.round(embeddedCover.length * 3 / 4 / 1024);
        coverThumb.src = embeddedCover;
        coverSize.textContent = "Embedded preview ready (~" + kb + " KB in the link).";
        coverPreview.hidden = false;
        build();
      };
      img.onerror = function () {
        embeddedCover = "";
        hint.textContent = "That file could not be read as an image. Try a JPG or PNG.";
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });

  coverRemove.addEventListener("click", function () {
    embeddedCover = "";
    coverFile.value = "";
    coverPreview.hidden = true;
    build();
  });

  function build() {
    var data = {
      project: f.project.value.trim(),
      client: f.client.value.trim(),
      drive: f.drive.value.trim()
    };
    if (embeddedCover) data.cover = embeddedCover;
    else if (f.cover.value.trim()) data.cover = f.cover.value.trim();

    if (!data.project || !data.drive) {
      out.value = "";
      preview.classList.add("is-off");
      hint.textContent = data.project || data.drive ? "Add both a project name and a Drive link to generate the link." : "";
      return;
    }
    var link = location.origin + "/deliver.html#" + utf8ToB64(JSON.stringify(data));
    out.value = link;
    preview.href = link;
    preview.classList.remove("is-off");
    hint.textContent = link.length > 60000
      ? "Heads up: this link is long — if it won't send, use the Remove photo option or a smaller cover."
      : "";
  }

  ["project", "client", "drive", "cover"].forEach(function (k) { f[k].addEventListener("input", build); });

  copyBtn.addEventListener("click", function () {
    if (!out.value) { hint.textContent = "Nothing to copy yet — fill in the fields above."; return; }
    out.select();
    out.setSelectionRange(0, 99999);
    function done() { copyBtn.textContent = "Copied!"; setTimeout(function () { copyBtn.textContent = "Copy"; }, 1600); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(out.value).then(done, function () { document.execCommand("copy"); done(); });
    } else {
      document.execCommand("copy"); done();
    }
  });

  build();
})();
</script>
<script src="js/main.js" defer></script>
</body>
</html>
